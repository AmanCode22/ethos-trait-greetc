name: Build macOS ARM .dylib

on:
  release:
    types: [published,edited]

jobs:
  build:
    runs-on: macos-latest 
    permissions:
      contents: write
    steps:
      - name: Checkout trait
        uses: actions/checkout@v4
        
      - name: Install build tools
        run: |
          brew update
          brew install cmake
          
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          
      - name: Build
        run: cmake --build build --config Release
        
      - name: Read trait name from config
        id: config
        run: |
          NAME=$(grep '"name"' manifest.json | cut -d'"' -f4)
          echo "trait_name=$NAME" >> $GITHUB_OUTPUT
          
      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/lib${{ steps.config.outputs.trait_name }}.dylib
          asset_name: ${{ steps.config.outputs.trait_name }}-macos-arm64.dylib
          tag: ${{ github.ref_name }}
          overwrite: true
