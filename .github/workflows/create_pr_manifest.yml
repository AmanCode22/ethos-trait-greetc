name: Create PR manifest

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag'
        required: true
        type: string

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Set up Ruby for license detection
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true 

      - name: Detect License
        run: |
          gem install licensee
          LICENSE=$(licensee detect --json | jq -r .license)
          echo "detected_license=$LICENSE" >> $GITHUB_ENV

      - name: Checkout trait repo
        uses: actions/checkout@v4
        with:
          path: trait-repo
          
      - name: Validate manifest.json exists
        run: |
          if [ ! -f "trait-repo/manifest.json" ]; then
            echo "Error: manifest.json not found"
            exit 1
          fi
          
      - name: Read manifest.json
        id: manifest
        run: |
          cd trait-repo
          NAME=$(jq -r '.name' manifest.json)
          echo "name=$NAME" >> $GITHUB_OUTPUT
          VERSION="${{ github.event.inputs.tag_name }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          echo "submitter=$REPO_OWNER" >> $GITHUB_OUTPUT
          REPO_URL="https://github.com/${{ github.repository }}"
          echo "repository=$REPO_URL" >> $GITHUB_OUTPUT
          
          DESCRIPTION=$(jq -r '.description // ""' manifest.json)
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          
      - name: Read tags from tags.txt
        id: tags
        run: |
          cd trait-repo
          if [ -f "tags.txt" ]; then
            TAGS=$(cat tags.txt | jq -R -s -c 'split("\n") | map(select(. != ""))')
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
          else
            echo "tags=[]" >> $GITHUB_OUTPUT
          fi
          
      - name: Generate pr manifest
        run: |
          cd trait-repo
          TAG="${{ github.event.inputs.tag_name }}"
          
          cat > platforms.json << EOF
          {
            "linux-x86_64": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-linux-x86_64.so",
              "checksum": ""
            },
            "linux-aarch64": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-linux-arm64.so",
              "checksum": ""
            },
            "macos-arm64": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-macos-arm64.dylib",
              "checksum": ""
            },
            "macos-x86_64": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-macos-intel.dylib",
              "checksum": ""
            },
            "windows": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-windows-x86_64.dll",
              "checksum": ""
            },
            "windows-arm64": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-windows-arm64.dll",
              "checksum": ""
            },
            "termux-aarch64": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-termux-arm64.so",
              "checksum": ""
            },
            "termux-armv7": {
              "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ steps.manifest.outputs.name }}-termux-armv7.so",
              "checksum": ""
            }
          }
          EOF
          
          jq --slurpfile platforms platforms.json \
             --arg version "${{ steps.manifest.outputs.version }}" \
             --arg description "${{ steps.manifest.outputs.description }}" \
             --arg submitter "${{ steps.manifest.outputs.submitter }}" \
             --arg repository "${{ steps.manifest.outputs.repository }}" \
             --arg license "${detected_license:-MIT}" \
             --argjson tags '${{ steps.tags.outputs.tags }}' \
             '. + {
               version: $version,
               description: $description,
               submitter: $submitter,
               repository: $repository,
               license: $license,
               platforms: $platforms[0],
               tags: $tags,
               verified: false
             }' manifest.json > pr_manifest.json
          
      - name: Fetch Release Asset Hashes and Update Manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag_name }}
        run: |
          gh release view "$TAG" --json assets --jq '.assets[] | "\(.name) \(.sha256)"' > hashes.txt
          NAME="${{ steps.manifest.outputs.name }}"
          cat > mapping.json << EOF
          {
            "linux-x86_64": "$NAME-linux-x86_64.so",
            "linux-aarch64": "$NAME-linux-arm64.so",
            "macos-arm64": "$NAME-macos-arm64.dylib",
            "macos-x86_64": "$NAME-macos-intel.dylib",
            "windows": "$NAME-windows-x86_64.dll",
            "windows-arm64": "$NAME-windows-arm64.dll",
            "termux-aarch64": "$NAME-termux-arm64.so",
            "termux-armv7": "$NAME-termux-armv7.so"
          }
          EOF
          jq -R 'split(" ") | {(.[0]): .[1]}' hashes.txt | jq -s 'add' > found_hashes.json
          jq --slurpfile mapping mapping.json \
             --slurpfile hashes found_hashes.json \
             'reduce ( .platforms | keys[] ) as $key (.;
               ($mapping[0][$key]) as $file |
               if $hashes[0][$file] then
                 .platforms[$key].checksum = "sha256:" + $hashes[0][$file]
               else
                 .
               end
             )' trait-repo/pr_manifest.json > trait-repo/manifest.json
          
      - name: Release pr manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          gh release upload "$TAG" trait-repo/manifest.json --clobber --repo ${{ github.repository }}
